name: Build the flutter version of the RustDesk

on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "nightly"
      build-arch:
        description: "Comma-separated list of architectures to build (e.g. 'x86_64,aarch64'). Empty or 'all' builds all architectures."
        type: string
        default: ""

env:
  SCITER_RUST_VERSION: "1.75" # https://github.com/rustdesk/rustdesk/discussions/7503, also 1.78 has ABI change which causes our sciter version not working, https://blog.rust-lang.org/2024/03/30/i128-layout-update.html
  RUST_VERSION: "1.75" # sciter failed on m1 with 1.78 because of https://blog.rust-lang.org/2024/03/30/i128-layout-update.html
  MAC_RUST_VERSION: "1.81" # 1.81 is requred for macos, because of https://github.com/yury/cidre requires 1.81
  CARGO_NDK_VERSION: "3.1.2"
  SCITER_ARMV7_CMAKE_VERSION: "3.29.7"
  SCITER_NASM_DEBVERSION: "2.15.05-1"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  # Windows arm64 only: the first stable Flutter to ship a native arm64 Windows Dart SDK +
  # engine is 3.44. Every other platform stays on FLUTTER_VERSION (3.24.5) until Windows 7
  # support is restored after the upstream-wide Flutter bump. The arm64 job patches the few
  # 3.44-only source/pubspec changes on the fly (see "Patch RustDesk sources for Flutter 3.44").
  FLUTTER_WINDOWS_ARM_VERSION: "3.44.0"
  # for arm64 linux because official Dart SDK does not work
  FLUTTER_ELINUX_VERSION: "3.16.9"
  TAG_NAME: "${{ inputs.upload-tag }}"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  # vcpkg version: 2025.08.27
  # If we change the `VCPKG COMMIT_ID`, please remember:
  # 1. Call `$VCPKG_ROOT/vcpkg x-update-baseline` to update the baseline in `vcpkg.json`.
  #  Or we may face build issue like
  #  https://github.com/rustdesk/rustdesk/actions/runs/14414119794/job/40427970174
  # 2. Update the `VCPKG_COMMIT_ID` in `ci.yml` and `playground.yml`.
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  ARMV7_VCPKG_COMMIT_ID: "6f29f12e82a8293156836ad81cc9bf5af41fe836" # 2025.01.13, got "/opt/artifacts/vcpkg/vcpkg: No such file or directory" with latest version
  VERSION: "1.4.8"
  NDK_VERSION: "r28c"
  #signing keys env variable checks
  ANDROID_SIGNING_KEY: "${{ secrets.ANDROID_SIGNING_KEY }}"
  MACOS_P12_BASE64: "${{ secrets.MACOS_P12_BASE64 }}"
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"
  SIGN_BASE_URL: "${{ secrets.SIGN_BASE_URL }}-2"

jobs:
  build-windows:
    if: ${{ inputs.build-arch == '' || inputs.build-arch == 'all' || contains(inputs.build-arch, 'x86_64') || contains(inputs.build-arch, 'aarch64') || contains(inputs.build-arch, 'x86') }}
    uses: ./.github/workflows/flutter-build-windows.yml
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      upload-tag: ${{ inputs.upload-tag }}
      build-arch: ${{ inputs.build-arch }}

  build-macos:
    if: ${{ inputs.build-arch == '' || inputs.build-arch == 'all' || contains(inputs.build-arch, 'x86_64') || contains(inputs.build-arch, 'aarch64') }}
    uses: ./.github/workflows/flutter-build-macos.yml
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      upload-tag: ${{ inputs.upload-tag }}
      build-arch: ${{ inputs.build-arch }}

  build-ios:
    if: ${{ inputs.build-arch == '' || inputs.build-arch == 'all' || contains(inputs.build-arch, 'aarch64') }}
    uses: ./.github/workflows/flutter-build-ios.yml
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      upload-tag: ${{ inputs.upload-tag }}
      build-arch: ${{ inputs.build-arch }}

  build-android:
    if: ${{ inputs.build-arch == '' || inputs.build-arch == 'all' || contains(inputs.build-arch, 'aarch64') || contains(inputs.build-arch, 'armv7') || contains(inputs.build-arch, 'x86_64') }}
    uses: ./.github/workflows/flutter-build-android.yml
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      upload-tag: ${{ inputs.upload-tag }}
      build-arch: ${{ inputs.build-arch }}

  build-linux:
    if: ${{ inputs.build-arch == '' || inputs.build-arch == 'all' || contains(inputs.build-arch, 'x86_64') || contains(inputs.build-arch, 'aarch64') || contains(inputs.build-arch, 'armv7') }}
    uses: ./.github/workflows/flutter-build-linux.yml
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      upload-tag: ${{ inputs.upload-tag }}
      build-arch: ${{ inputs.build-arch }}

  build-web:
    if: ${{ inputs.build-arch == '' || inputs.build-arch == 'all' || contains(inputs.build-arch, 'web') }}
    uses: ./.github/workflows/flutter-build-web.yml
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      upload-tag: ${{ inputs.upload-tag }}
      build-arch: ${{ inputs.build-arch }}

  publish_unsigned:
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    if: ${{ inputs.upload-artifact }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rustdesk-unsigned-macos-x86_64
          path: ./

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rustdesk-unsigned-macos-aarch64
          path: ./

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rustdesk-unsigned-windows-x86_64
          path: ./windows-x86_64/

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rustdesk-unsigned-windows-x86
          path: ./windows-x86/

      - name: Combine unsigned app
        run: |
          tar czf rustdesk-${{ env.VERSION }}-unsigned.tar.gz *.dmg windows-x86_64 windows-x86

      - name: Publish unsigned app
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: rustdesk-${{ env.VERSION }}-unsigned.tar.gz
