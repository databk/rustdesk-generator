name: Build RustDesk for Windows (x86)

on:
  workflow_call:
    inputs:
      request_id:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      request_id:
        type: string
        default: ""

env:
  LLVM_VERSION: "15.0.6"
  # vcpkg version: 2025.08.27
  # If we change the `VCPKG COMMIT_ID`, please remember:
  # 1. Call `$VCPKG_ROOT/vcpkg x-update-baseline` to update the baseline in `vcpkg.json`.
  #  Or we may face build issue like
  #  https://github.com/rustdesk/rustdesk/actions/runs/14414119794/job/40427970174
  # 2. Update the `VCPKG_COMMIT_ID` in `ci.yml` and `playground.yml`.
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.9"

jobs:
  # The fallback for the flutter version, we use Sciter for 32bit Windows.
  build-for-windows-sciter:
    name: i686-pc-windows-msvc (windows-2022)
    runs-on: windows-2022
    # Temporarily disable this action due to additional test is needed.
    # if: false
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: rustdesk/rustdesk
          ref: refs/tags/1.4.9
          submodules: recursive

      - name: Download generator
        shell: bash
        run: |
          curl -L -o generator-windows-x86_64.exe https://github.com/databk/rustdesk-generator/releases/download/generator/generator-windows-x86_64.exe
          chmod +x generator-windows-x86_64.exe

      - name: Run generator (post-checkout)
        env:
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: ./generator-windows-x86_64.exe post-checkout

      - name: Compute source hash
        id: hash
        shell: bash
        run: |
          SOURCE_HASH=$(find . -type f \
            -not -path "./.git/*" \
            -not -path "./target/*" \
            -not -path "./flutter/build/*" \
            -not -path "./.dart_tool/*" \
            -not -path "./.pub-cache/*" \
            -not -path "./build/*" \
            | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
          echo "source_hash=$SOURCE_HASH" >> "$GITHUB_OUTPUT"
          echo "Cache key: rustdesk-build-sciter-x86-$SOURCE_HASH"

      - name: Restore build cache
        id: build-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ./Release
            ./target/release/rustdesk-portable-packer.exe
          key: rustdesk-build-sciter-x86-${{ steps.hash.outputs.source_hash }}

      - name: Install LLVM and Clang
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: rustdesk-org/install-llvm-action-32bit@6aa7d9ad3df84dff01cd4596dd0fc880a7f47fce # no release tag; commit 2026-05-26
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Rust toolchain
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly-2023-10-13-i686-pc-windows-msvc # must use nightly here, because of abi_thiscall feature required
          targets: i686-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: steps.build-cache.outputs.cache-hit != 'true'
        with:
          prefix-key: windows-2022-sciter

      - name: Setup vcpkg with Github Actions binary cache
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        if: steps.build-cache.outputs.cache-hit != 'true'
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x86-windows-static
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x86-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x86-windows-static-rel-out.log" || true
        shell: bash

      - name: Build rustdesk
        if: steps.build-cache.outputs.cache-hit != 'true'
        id: build
        shell: bash
        run: |
          python3 res/inline-sciter.py
          # Patch sciter x86
          sed -i 's/branch = "dyn"/branch = "dyn_x86"/g' ./Cargo.toml
          cargo update -p sciter-rs --precise 674e07d3066ca9a92ced3816203ab6b652629d1e
          cargo build --locked --features inline,vram,hwcodec --release --bins
          mkdir -p ./Release
          mv ./target/release/rustdesk.exe ./Release/rustdesk.exe
          curl -LJ -o ./Release/sciter.dll https://github.com/c-smile/sciter-sdk/raw/master/bin.win/x32/sciter.dll
          echo "output_folder=./Release" >> $GITHUB_OUTPUT
          curl -LJ -o ./usbmmidd_v2.zip https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip
          unzip usbmmidd_v2.zip
          # Do not remove x64 files, because the user may run the 32bit version on a 64bit system.
          # Do not remove ./usbmmidd_v2/deviceinstaller64.exe, as x86 exe cannot install and uninstall drivers when running on x64,
          # we need the x64 exe to install and uninstall the driver.
          rm -rf ./usbmmidd_v2/deviceinstaller.exe ./usbmmidd_v2/usbmmidd.bat
          mv ./usbmmidd_v2 ./Release || true

      - name: Save build cache
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ./Release
            ./target/release/rustdesk-portable-packer.exe
          key: ${{ steps.build-cache.outputs.cache-primary-key }}

      - name: Run generator (post-build)
        env:
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
          REQUEST_ID: ${{ inputs.request_id }}
        run: ./generator-windows-x86_64.exe post-build

      - name: find Runner.res
        # Windows: find Runner.res (compiled from ./flutter/windows/runner/Runner.rc), copy to ./Runner.res
        # Runner.rc does not contain actual version, but Runner.res does
        continue-on-error: true
        shell: bash
        run: |
          runner_res=$(find . -name "Runner.res");
          if [ "$runner_res" == "" ]; then
            echo "Runner.res: not found";
          else
            echo "Runner.res: $runner_res";
            cp $runner_res ./libs/portable/Runner.res;
            echo "list ./libs/portable/Runner.res";
            ls -l ./libs/portable/Runner.res;
          fi

      - name: Run generator (sign-files)
        env:
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: ./generator-windows-x86_64.exe sign-files

      - name: Build self-extracted executable
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../Release/ -o . -e ../../Release/rustdesk.exe
          popd
          mkdir -p ./SignOutput
          mv ./target/release/rustdesk-portable-packer.exe ./SignOutput/rustdesk-${{ env.VERSION }}-x86-sciter.exe

      - name: Run generator (sign-portable)
        env:
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: ./generator-windows-x86_64.exe sign-portable

      - name: Run generator (publish)
        env:
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
          REQUEST_ID: ${{ inputs.request_id }}
        run: ./generator-windows-x86_64.exe publish
